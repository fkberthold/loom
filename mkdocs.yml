site_name: loom
site_description: Workflow infrastructure for Claude Code — beads + MemPalace + superpowers + beadpowers woven into one disciplined developer workflow.
site_url: https://fkberthold.github.io/loom/
repo_url: https://github.com/fkberthold/loom
repo_name: fkberthold/loom
edit_uri: edit/main/docs/

docs_dir: docs

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.tracking
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.action.edit
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - include-markdown:
      exclude:
        - "**/internal/**"
        - "**/*.draft.md"

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

nav:
  - Home: index.md
  - Tutorials:
      - tutorials/index.md
      - Workflow walkthrough: tutorials/walkthrough.md
      - Feature walkthrough: tutorials/feature-walkthrough.md
  - How-to:
      - how-to/index.md
      - Install loom: how-to/install.md
  - Reference:
      - reference/index.md
      - Skills:
          - reference/skills/session-startup.md
  - Explanation:
      - explanation/index.md
      - Mental model: explanation/mental-model.md
