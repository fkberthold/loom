site_name: loom
site_description: Workflow infrastructure for Claude Code — beads + MemPalace + superpowers + beadpowers woven into one disciplined developer workflow.
site_url: https://fkberthold.github.io/loom/
repo_url: https://github.com/fkberthold/loom
repo_name: fkberthold/loom
edit_uri: edit/main/docs/

docs_dir: docs

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.tracking
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.action.edit
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - include-markdown:
      exclude:
        - "**/internal/**"
        - "**/*.draft.md"

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

nav:
  - Home: index.md
  - Tutorials:
      - tutorials/index.md
      - Getting started: tutorials/getting-started.md
      - Bug walkthrough: tutorials/bug-walkthrough.md
      - Feature walkthrough: tutorials/feature-walkthrough.md
  - How-to:
      - how-to/index.md
      - Install loom: how-to/install.md
      - Open a session: how-to/open-a-session.md
      - Claim a bead: how-to/claim-a-bead.md
      - Finish a bead: how-to/finish-a-bead.md
      - Stop a session: how-to/stop-a-session.md
      - Bypass workflow ceremony: how-to/bypass-workflow-ceremony.md
      - Where to update what: how-to/where-to-update-what.md
      - Common scenarios:
          - how-to/common-scenarios/index.md
          - New bug: how-to/common-scenarios/new-bug.md
          - Parallel bugs: how-to/common-scenarios/parallel-bugs.md
          - Exploratory work: how-to/common-scenarios/exploratory-work.md
          - Find prior art: how-to/common-scenarios/find-prior-art.md
          - Debug workflow: how-to/common-scenarios/debug-workflow.md
          - Tweak a hook: how-to/common-scenarios/tweak-a-hook.md
          - Add a path-scoped rule: how-to/common-scenarios/add-path-rule.md
  - Reference:
      - reference/index.md
      - Installed files: reference/installed-files.md
      - Skills:
          - reference/skills/index.md
          - All skills: reference/skills/all-skills.md
      - Slash commands:
          - reference/slash-commands/index.md
          - All commands: reference/slash-commands/all-commands.md
      - Subagents:
          - reference/subagents/index.md
          - All subagents: reference/subagents/all-subagents.md
      - Hooks:
          - reference/hooks/index.md
          - All hooks: reference/hooks/all-hooks.md
      - Path-scoped rules: reference/path-scoped-rules.md
      - bd CLI: reference/bd-cli.md
      - MemPalace MCP: reference/mempalace-mcp.md
      - Decision tables: reference/decision-tables.md
      - Glossary: reference/glossary.md
  - Explanation:
      - explanation/index.md
      - Mental model: explanation/mental-model.md
      - Recipe family: explanation/recipe-family.md
      - Workflow modes: explanation/workflow-modes.md
      - Provenance: explanation/provenance.md
